<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Angel Leijendekker</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/fontawesome-all.min.css">
    <link rel="stylesheet" href="css/fullpage.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>

    <main id="fullpage">
        <div class="section banner" data-anchor="Home" data-tooltip="Home">
            <div class="v-lines">
                <div class="vline-1"></div>
                <div class="vline-2"></div>
                <div class="vline-3"></div>
                <div class="vline-4"></div>
            </div>
            <div class="cover"></div>
            <div class="container">
                <div class="row d-flex justify-content-md-center">
                    <div class="col-md-10 justify-content-center align-self-center">
                        <h1>
                            <div>Hello,</div>
                            <span>I am</span>
                            <span class="words-wrapper">
                                <b>Angel Leijendekker</b>
                                <b class="hidden">a Web Developer</b>
                                <b class="hidden">a Web and UI/UX Designer</b>
                            </span>
                        </h1>
                    </div>
                    <div class="col-md-10">
                        <i class="fab fa-facebook-f p-2"></i>
                        <i class="fab fa-instagram p-2"></i>
                        <i class="fab fa-github p-2"></i>
                        <i class="fab fa-behance p-2"></i>
                    </div>
                </div>
            </div>
            <div class="scroll-down is-active is-inview" scroll-down="home" data-controller="opinview" op-inview="0, 0.7" op-inview-deactivate="">
                <div class="scroll-down__text"><span>scroll down</span></div>
                <div class="scroll-down__line"></div>
            </div>   
        </div>

        <div class="section about" data-anchor="About" data-tooltip="About">
            <div class="container">
                <div class="row d-flex justify-content-md-center">
                     <div class="col-md-10 justify-content-center align-self-center">
                        <h1>ABOUT ME</h1>
                        <div class="row">
                            <div class="col-md-10 mt-3">
                                <p>Lorem ipsum is placeholder text commonly used in the graphic, print, and publishing industries for previewing layouts and visual mockups.I'm Pregnant</p>
                            </div>
                            <div class="col-md-10 mt-3">
                                <i class="fab fa-facebook-f p-2"></i>
                                <i class="fab fa-instagram p-2"></i>
                                <i class="fab fa-github p-2"></i>
                                <i class="fab fa-behance p-2"></i>
                            </div>
                        </div>
                     </div>
                </div>
            </div>
        </div>



        <div class="section" data-anchor="Works" data-tooltip="Works">Section 3</div>
        <div class="section" data-anchor="Contact" data-tooltip="Contact">Section 4</div>
    </main>

    <script src="js/jquery.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>

    <script src="js/app.js"></script>

</html>
