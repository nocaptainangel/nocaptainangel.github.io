<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Angel Leijendekker</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/fontawesome-all.min.css">
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>

    <header class="fixed-top">
       <img src="img/logo2.png" height="40">
    </header>

    <main id="fullpage">
        <div class="section banner">
            <div class="cover"></div>
            <div class="container d-flex h-100">
                <div class="row col text-center">
                    <div class="col-12 justify-content-center align-self-center">
                        <h1 class="text-left">
                            <span>Hello,</span>
                            <br>
                            <span>I am </span>
                            <span class="words-wrapper">
                                <b>Angel Leijendekker</b>
                                <b class="hidden">a Web Developer</b>
                                <b class="hidden">a Web and UI/UX Designer</b>
                            </span>
                        </h1>
                    </div>
                </div>
            </div>
            <div class="scroll-down is-active is-inview" scroll-down="home" data-controller="opinview" op-inview="0, 0.7" op-inview-deactivate="">
            <div class="scroll-down__text"><span>scroll down</span></div>
            <div class="scroll-down__line"></div>
            </div>
        </div>
        <div class="section">Section 2</div>
        <div class="section">Section 3</div>
        <div class="section">Section 4</div>
    </main>

    <script src="js/jquery.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/fullpage.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
